<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="渐进式算法学习站 · 课程、动态图解、在线判题与间隔复习" />
    <script>
      // 防主题闪烁(FOUC)：在首屏绘制前按 localStorage 设好 .dark。默认暗色，浅色为显式 opt-in。
      (function () {
        try {
          if (localStorage.getItem('algo-station:theme') !== 'light') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg text-ink font-sans antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
